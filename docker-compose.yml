name: biddex

services:
  postgres-auth:
    image: postgres:16-alpine
    container_name: postgres-auth
    hostname: postgres-auth
    environment:
      POSTGRES_DB: biddex_auth
      POSTGRES_USER: biddex
      POSTGRES_PASSWORD: biddex
    ports:
      - "5433:5432"
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
    networks:
      - biddex-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biddex -d biddex_auth"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres-tender:
    image: postgres:16-alpine
    container_name: postgres-tender
    hostname: postgres-tender
    environment:
      POSTGRES_DB: biddex_tender
      POSTGRES_USER: biddex
      POSTGRES_PASSWORD: biddex
    ports:
      - "5434:5432"
    volumes:
      - postgres-tender-data:/var/lib/postgresql/data
      - ./docker/postgres-tender/init:/docker-entrypoint-initdb.d:ro
    networks:
      - biddex-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biddex -d biddex_tender"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mongodb:
    image: mongo:7.0
    container_name: mongodb
    hostname: mongodb
    environment:
      MONGO_INITDB_DATABASE: biddex_bidding
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - biddex-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "quit(db.adminCommand('ping').ok ? 0 : 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: redis
    hostname: redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - biddex-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    hostname: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    networks:
      - biddex-network
    healthcheck:
      test: ["CMD-SHELL", "cub zk-ready localhost:2181 40"]
      interval: 15s
      timeout: 45s
      retries: 5
      start_period: 30s

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    hostname: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - biddex-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 15s
      retries: 10
      start_period: 60s

  minio:
    image: minio/minio:latest
    container_name: minio
    hostname: minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: biddex
      MINIO_ROOT_PASSWORD: biddexsecret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - biddex-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  zipkin:
    image: openzipkin/zipkin:3.4
    container_name: zipkin
    hostname: zipkin
    ports:
      - "9411:9411"
    networks:
      - biddex-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9411/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    container_name: elasticsearch
    hostname: elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - biddex-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s >/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 60s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.2
    container_name: kibana
    hostname: kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    volumes:
      - kibana-data:/usr/share/kibana/data
    networks:
      - biddex-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status >/dev/null"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 90s

  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.2
    container_name: logstash
    hostname: logstash
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5044:5044"
    volumes:
      - ./docker/logstash/pipeline/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - logstash-data:/usr/share/logstash/data
    networks:
      - biddex-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9600/_node/stats >/dev/null"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 90s

networks:
  biddex-network:
    name: biddex-network
    driver: bridge

volumes:
  postgres-auth-data:
  postgres-tender-data:
  mongodb-data:
  redis-data:
  zookeeper-data:
  zookeeper-log:
  kafka-data:
  minio-data:
  elasticsearch-data:
  kibana-data:
  logstash-data:
