spring:
  datasource:
    url: jdbc:h2:mem:biddex_company;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  cloud:
    discovery:
      enabled: false

eureka:
  client:
    enabled: false

logging:
  logstash:
    destination: 127.0.0.1:5044
